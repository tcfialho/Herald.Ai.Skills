version: 1
name: happy-path
goal: "Dirty tree with two logical groups; user approves the plan, commits, then skips the push."
fixture: happy-path
invocation: auto
opening_prompt: "commit my changes"
allowed_tools: ["Skill", "Read", "Glob", "Write", "Edit", "Bash", "PowerShell"]
user_script:
# anchors must survive wording changes across skill versions (profile --vs-ref
# A/B): "Approve and execute" is the stable menu label in every version so far.
  - expect_any: ["Approve and execute", "How do you want to proceed with this commit plan"]
    respond_label: "Approve and execute"
  - expect_any: ["Push these commits now", "Push and set upstream", "Push?"]
    respond_label: "Skip"
contract_focus: [G-05, G-06, G-07, G-08, G-10]
budget: {max_turns: 8, max_cost_usd: 0.60, timeout_s: 420}
